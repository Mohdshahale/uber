<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clock Input</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <style>
    body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  position: relative;
  padding: 20px;
  border-radius: 10px;
  transition: 0.3s;
}

.container.active {
  outline: 2px solid #007bff;
}

.input-wrapper {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #007bff;
  color: white;
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
  user-select: none;
}

.input-wrapper i {
  font-size: 18px;
}

.input-wrapper input {
  background: transparent;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
  outline: none;
}

.input-wrapper:hover {
  background: #0056b3;
}

.calendar {
  display: none;
  position: absolute;
  top: 65px;
  left: 0;
  background: white;
  border: 1px solid #ccc;
  padding: 10px;
  border-radius: 8px;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
}

.calendar.active {
  display: block;
}
  </style>
</head>
<body>

  <div class="container" id="myDiv">
    <div class="input-wrapper">
      <i class="fa-regular fa-calendar-days"></i>
      <input type="text" id="dateInput" value="Today" readonly>
    </div>

    <div class="calendar" id="calendar">
      <input type="date" id="actualDate">
    </div>
  </div>

  <script>
    const inputWrapper = document.querySelector('.input-wrapper');
const div = document.getElementById('myDiv');
const calendar = document.getElementById('calendar');
const dateInput = document.getElementById('actualDate');
const displayInput = document.getElementById('dateInput');

inputWrapper.addEventListener('click', () => {
  div.classList.toggle('active');       // Outline the div
  calendar.classList.toggle('active');  // Toggle calendar visibility
});

dateInput.addEventListener('change', () => {
  const selectedDate = new Date(dateInput.value);
  const formatted = selectedDate.toDateString();
  displayInput.value = formatted;       // Replace "Today" with selected date
  calendar.classList.remove('active');  // Hide calendar after selecting
});
  </script>
</body>
</html>
